name: Recover SSH access (temporary)
on:
  workflow_dispatch:

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - name: Re-add MacBook SSH key (idempotent)
        uses: appleboy/ssh-action@2ead5e36573f08b82fbfce1504f1a4b05a647c6f # v1.2.2
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            AK=/root/.ssh/authorized_keys
            KEY="ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMAx7ysoa7Q0SZhoSUghjgTMseFRzr7IgZCZxuOjF5bi ndev@nathans-mbp-macbook"
            FP="SHA256:qMZtvD39mcTEJy3mMtmxyGuxI0IG/LMCfgPkXMNR/KQ"
            if ssh-keygen -lf "$AK" 2>/dev/null | grep -q "$FP"; then
              echo "Mac key already present — nothing to do"
            else
              printf '%s\n' "$KEY" >> "$AK"
              chmod 600 "$AK"
              echo "Mac key re-added"
            fi
            echo "--- current authorized keys ---"
            ssh-keygen -lf "$AK"
